name: AliExpress API Product Sync

on:
  schedule:
    # كل يوم الساعة 2:00 صباحاً (UTC) — قبل Admitad sync بساعة
    - cron: '0 2 * * *'
  workflow_dispatch:
    # تشغيل يدوي من لوحة GitHub Actions في أي وقت
    inputs:
      dry_run:
        description: 'Dry run (log only, do not save to DB)'
        required: false
        default: 'false'

jobs:
  aliexpress-api-sync:
    name: 🛍️ AliExpress API → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 🛒 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-sync.txt

      - name: 🔑 Verify Required Secrets
        run: |
          echo "Checking required environment variables..."
          if [ -z "$ALIEXPRESS_APP_KEY" ]; then
            echo "❌ ERROR: ALIEXPRESS_APP_KEY is not set!"
            exit 1
          fi
          if [ -z "$ALIEXPRESS_APP_SECRET" ]; then
            echo "❌ ERROR: ALIEXPRESS_APP_SECRET is not set!"
            exit 1
          fi
          if [ -z "$ALIEXPRESS_ACCESS_TOKEN" ]; then
            echo "❌ ERROR: ALIEXPRESS_ACCESS_TOKEN is not set!"
            exit 1
          fi
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ ERROR: DATABASE_URL (Supabase) is not set!"
            exit 1
          fi
          echo "✅ All required secrets are present."

      - name: 🚀 Run AliExpress API Sync
        env:
          # ─── Supabase Database ───────────────────────────────────────────
          DATABASE_URL:              ${{ secrets.DATABASE_URL }}
          # ─── AliExpress API Credentials ─────────────────────────────────
          ALIEXPRESS_APP_KEY:        ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_APP_SECRET:     ${{ secrets.ALIEXPRESS_APP_SECRET }}
          ALIEXPRESS_ACCESS_TOKEN:   ${{ secrets.ALIEXPRESS_ACCESS_TOKEN }}
          # ─── Flask App Settings ──────────────────────────────────────────
          SECRET_KEY:                ${{ secrets.SECRET_KEY }}
          FLASK_ENV:                 "production"
          HTTPS_ENABLED:             "True"
          # ─── Dry Run Option ──────────────────────────────────────────────
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "▶️  Starting AliExpress API Sync..."
          python scripts/aliexpress_api_sync.py

      - name: 📊 Report Results
        if: always()
        run: |
          echo "══════════════════════════════════════"
          echo "✅ Sync job completed."
          echo "Check logs above for detailed results."
          echo "══════════════════════════════════════"
