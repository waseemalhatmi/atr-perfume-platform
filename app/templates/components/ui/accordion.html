{% macro accordion(items=[], class="") %}
<div class="accordion {{ class }}">
  {% for item in items %}
  <div class="accordion-item">
    <button class="accordion-trigger" type="button" aria-expanded="false">
      <span class="accordion-title luxury-text text-lg">{{ item.title }}</span>
      <span class="accordion-icon text-gold">
        <i class="fas fa-chevron-down"></i>
      </span>
    </button>
    <div class="accordion-content">
      <div class="accordion-content-inner text-muted-foreground leading-relaxed">
        {{ item.content | safe }}
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endmacro %}
