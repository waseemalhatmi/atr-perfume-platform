name: AliExpress Scraper Sync

on:
  schedule:
    # كل يوم الساعة 4:00 صباحاً UTC (بعد ساعتين من API sync الساعة 2:00)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, do not save to DB)'
        required: false
        default: 'false'

env:
  DATABASE_URL:          ${{ secrets.DATABASE_URL }}
  SECRET_KEY:            ${{ secrets.SECRET_KEY }}
  REDIS_URL:             "memory://"
  RATELIMIT_STORAGE_URI: "memory://"
  FLASK_ENV:             "development"
  HTTPS_ENABLED:         "False"
  DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aliexpress-scraper:
    name: "AliExpress Scraper → Supabase"
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-sync.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Verify Required Secrets
        run: |
          echo "Checking required environment variables..."
          MISSING=0
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL (Supabase) is not set!"
            MISSING=1
          else
            echo "OK: DATABASE_URL is set"
          fi
          if [ -z "$SECRET_KEY" ]; then
            echo "WARNING: SECRET_KEY is not set — using auto-generated key"
          else
            echo "OK: SECRET_KEY is set"
          fi
          if [ "$MISSING" -eq 1 ]; then
            echo "Required secrets missing. Add them at:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "All required secrets present. Proceeding..."

      - name: Run AliExpress Scraper
        run: |
          echo "Starting AliExpress Scraper..."
          python scripts/aliexpress_scraper.py

      - name: Report Results
        if: always()
        run: |
          echo "======================================"
          echo "Scraper job finished. Check logs above."
          echo "Source tag in DB: aliexpress_scraper"
          echo "======================================"
