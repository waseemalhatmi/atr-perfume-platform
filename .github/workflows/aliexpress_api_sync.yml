name: AliExpress API Product Sync

on:
  schedule:
    # كل يوم الساعة 2:00 صباحاً (UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, do not save to DB)'
        required: false
        default: 'false'

# ── تعريف المتغيرات البيئية على مستوى الـ Job كله (تنطبق على جميع الخطوات) ──
env:
  DATABASE_URL:              ${{ secrets.DATABASE_URL }}
  ALIEXPRESS_APP_KEY:        ${{ secrets.ALIEXPRESS_APP_KEY }}
  ALIEXPRESS_APP_SECRET:     ${{ secrets.ALIEXPRESS_APP_SECRET }}
  ALIEXPRESS_ACCESS_TOKEN:   ${{ secrets.ALIEXPRESS_ACCESS_TOKEN }}
  ALIEXPRESS_REFRESH_TOKEN:  ${{ secrets.ALIEXPRESS_REFRESH_TOKEN }}
  SECRET_KEY:                ${{ secrets.SECRET_KEY }}
  # Redis not needed for sync - use memory fallback
  REDIS_URL:                 "memory://"
  RATELIMIT_STORAGE_URI:     "memory://"
  # Use sync mode to bypass strict production checks
  FLASK_ENV:                 "development"
  HTTPS_ENABLED:             "False"
  DRY_RUN:                   ${{ github.event.inputs.dry_run || 'false' }}
  # ── FIX: Node.js 20 deprecation warning ──────────────────────────────────────
  # actions/checkout@v4 and actions/setup-python@v5 default to Node.js 20.
  # Node.js 20 will be removed from runners on 2026-09-16.
  # This variable forces Node.js 24 now to eliminate warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aliexpress-api-sync:
    name: "AliExpress API to Supabase"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-sync.txt

      - name: Verify Required Secrets
        run: |
          echo "Checking required environment variables..."
          MISSING=0

          if [ -z "$ALIEXPRESS_APP_KEY" ]; then
            echo "ERROR: ALIEXPRESS_APP_KEY is not set!"
            MISSING=1
          else
            echo "OK: ALIEXPRESS_APP_KEY is set"
          fi

          if [ -z "$ALIEXPRESS_APP_SECRET" ]; then
            echo "ERROR: ALIEXPRESS_APP_SECRET is not set!"
            MISSING=1
          else
            echo "OK: ALIEXPRESS_APP_SECRET is set"
          fi

          if [ -z "$ALIEXPRESS_ACCESS_TOKEN" ]; then
            echo "ERROR: ALIEXPRESS_ACCESS_TOKEN is not set!"
            MISSING=1
          else
            echo "OK: ALIEXPRESS_ACCESS_TOKEN is set"
          fi

          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL (Supabase) is not set!"
            MISSING=1
          else
            echo "OK: DATABASE_URL is set"
          fi

          if [ -z "$ALIEXPRESS_REFRESH_TOKEN" ]; then
            echo "WARNING: ALIEXPRESS_REFRESH_TOKEN is not set - Auto-refresh DISABLED!"
            echo "         Token must be manually renewed every 30 days."
          else
            echo "OK: ALIEXPRESS_REFRESH_TOKEN is set (Auto-refresh ENABLED)"
          fi

          if [ "$MISSING" -eq 1 ]; then
            echo "One or more required secrets are missing. Add them at:"
            echo "https://github.com/waseemalhatmi/atr-perfume-platform/settings/secrets/actions"
            exit 1
          fi

          echo "All required secrets are present. Proceeding..."

      - name: Run AliExpress API Sync
        run: |
          echo "Starting AliExpress API Sync..."
          python scripts/aliexpress_api_sync.py

      - name: Report Results
        if: always()
        run: |
          echo "======================================"
          echo "Sync job finished. Check logs above."
          echo "======================================"
          if [ -z "$ALIEXPRESS_REFRESH_TOKEN" ]; then
            echo ""
            echo "WARNING: ALIEXPRESS_REFRESH_TOKEN is not set!"
            echo "   Auto-refresh is DISABLED. You must manually update"
            echo "   ALIEXPRESS_ACCESS_TOKEN in Secrets every 30 days."
            echo "   Get your Refresh Token: python scripts/get_aliexpress_token.py"
            echo "   Then add it at: https://github.com/${{ github.repository }}/settings/secrets/actions"
          else
            echo "Auto-Refresh is ENABLED (ALIEXPRESS_REFRESH_TOKEN is set)"
          fi
          echo "======================================"
